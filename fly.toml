# Atheris — Fly.io deployment configuration
# Deploy: fly launch --copy-config
# Docs:   https://fly.io/docs/

app = "atheris-demo"
primary_region = "ord"        # Chicago — change to nearest: iad, lax, sea, lhr, fra, sin, syd
kill_signal    = "SIGINT"
kill_timeout   = 5

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PORT           = "7337"
  ORCA_HOME      = "/data"
  # ORCA_OLLAMA_HOST is intentionally unset here — the demo uses the cloud
  # Ollama instance (see [services] below) or set it to your own.

[mounts]
  # Persistent volume for SQLite auth DB, session history, and doc registry.
  # Create: fly volumes create atheris_data --size 3 --region ord
  source      = "atheris_data"
  destination = "/data"
  initial_size = 3   # GB

[http_service]
  internal_port       = 7337
  force_https         = true
  auto_stop_machines  = true    # scale to zero when idle — saves $
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"

[[statics]]
  # Serve the web UI directly from Fly's edge (faster than hitting the app)
  guest_path = "/app/orca/serve/web"
  url_prefix = "/static"
