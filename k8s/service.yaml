apiVersion: v1
kind: Service
metadata:
  name: atheris
spec:
  selector:
    app: atheris
  ports:
  - port: 80
    targetPort: 7337
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atheris-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: atheris.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atheris
            port:
              number: 80
