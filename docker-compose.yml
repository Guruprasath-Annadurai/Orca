version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: atheris-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment for GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Optional — only needed once you're running multiple `atheris` API
  # instances behind a load balancer. A single local install is fine on
  # SQLite (the default, no ORCA_DATABASE_URL needed). Uncomment this service
  # plus the ORCA_DATABASE_URL line below when moving to production scale.
  postgres:
    image: postgres:17-alpine
    container_name: atheris-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: orca
      POSTGRES_PASSWORD: ${ORCA_DB_PASSWORD:-change-me-in-production}
      POSTGRES_DB: orca
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orca"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional — only needed for cross-instance session continuity (a user's
  # conversation history surviving a process restart or landing on a
  # different API replica). Single-instance/local installs work fine without
  # it — sessions just live in that one process's memory, exactly as today.
  redis:
    image: redis:7-alpine
    container_name: atheris-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  atheris:
    build: .
    container_name: atheris-server
    ports:
      - "7337:7337"
    volumes:
      - atheris_data:/root/.orca
    environment:
      ORCA_OLLAMA_HOST: http://ollama:11434
      ORCA_CORE_MODEL:  ${ORCA_CORE_MODEL:-qwen2.5:14b}
      ORCA_NANO_MODEL:  ${ORCA_NANO_MODEL:-qwen2.5:7b}
      ORCA_ULTRA_MODEL: ${ORCA_ULTRA_MODEL:-qwen2.5:14b}
      ORCA_AUTH_SECRET: ${ORCA_AUTH_SECRET:-change-me-in-production}
      # Uncomment to switch from local SQLite to Postgres (needed for
      # multi-instance / horizontally-scaled deployments):
      # ORCA_DATABASE_URL: postgresql://orca:${ORCA_DB_PASSWORD:-change-me-in-production}@postgres:5432/orca
      # Uncomment for cross-instance session continuity:
      # ORCA_REDIS_URL: redis://redis:6379/0
    depends_on:
      - ollama
      # - postgres  # uncomment alongside ORCA_DATABASE_URL above
      # - redis     # uncomment alongside ORCA_REDIS_URL above
    restart: unless-stopped

volumes:
  ollama_data:
  atheris_data:
  postgres_data:
  redis_data:
